<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비대면 보험 보장 분석 및 상담</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="pamphlet-wrapper">

        <!-- [1단계] 메인 팜플렛 화면 -->
        <div id="step-main" class="page-step active">
            <div class="image-section" onclick="openModal()">
                <img src="images/final.png" alt="보험 보장 팜플렛 메인">
            </div>

            <div class="action-bar">
                <!-- 상담 폼으로 바로 가던 것을 AI 챗봇을 먼저 거치도록 유도 -->
                <button type="button" class="btn btn-next" onclick="goToChatbot()">
                    AI에게 내 보험 약관 먼저 물어보기
                </button>
            </div>
        </div>

        <!-- 팜플렛 이미지 확대 모달 -->
        <div id="imageModal" class="modal" onclick="closeModal()">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <img class="modal-content" id="modalImg" src="images/final.png" alt="확대된 팜플렛 이미지">
        </div>

        <!-- [2단계] AI 챗봇 화면 (신설) -->
        <div id="step-chatbot" class="page-step">
            <div class="back-nav">
                <button type="button" class="btn-back" onclick="goToMain()">팜플렛 다시 보기</button>
            </div>
            
            <div class="chat-container">
                <div class="chat-header">보험 보장 분석 AI 어시스턴트</div>
                <div id="chat-box" class="chat-box"></div>
                <div class="chat-input-area">
                    <input type="text" id="user-input" placeholder="뇌경색 진단비 한도가 궁금해요...">
                    <button id="btn-send">전송</button>
                </div>
            </div>

            <div class="action-bar">
                <!-- 챗봇과 대화하다가 확신이 들면 최종 신청서로 이동 -->
                <button type="button" class="btn btn-next" onclick="goToForm()">
                    내 보장 분석 정식 신청하기
                </button>
            </div>
        </div>

        <!-- [3단계] 최종 상담 신청서 작성 화면 -->
        <div id="step-form" class="page-step">
            <div class="back-nav">
                <!-- 신청서 단계에서도 챗봇 대화방으로 돌아갈 수 있게 수정 -->
                <button type="button" class="btn-back" onclick="goToChatbot()">AI 챗봇 대화로 돌아가기</button>
            </div>

            <section class="form-section">
                <h2 class="form-title">상담 정보 입력</h2>

                <form id="consultForm" onsubmit="handleFormSubmit(event)">
                    <div class="form-group">
                        <label for="clientName">성함</label>
                        <input type="text" id="clientName" class="form-input" placeholder="홍길동" required>
                    </div>

                    <div class="form-group">
                        <label for="clientPhone">연락처</label>
                        <input type="tel" id="clientPhone" class="form-input" placeholder="01012345678" maxlength="13" required>
                        <p class="input-hint">하이픈(-)을 빼고 숫자만 입력해주세요.</p>
                    </div>

                    <div class="form-group">
                        <label class="group-label">어떤 부분이 가장 걱정되시나요? (중복 선택 가능)</label>
                        <div class="checkbox-group">
                            <label class="check-item">
                                <input type="checkbox" name="insurance_type" value="사망"><span>사망</span>
                            </label>
                            <label class="check-item">
                                <input type="checkbox" name="insurance_type" value="암"><span>암</span>
                            </label>
                            <label class="check-item">
                                <input type="checkbox" name="insurance_type" value="뇌,심장"><span>뇌 · 심장</span>
                            </label>
                            <label class="check-item">
                                <input type="checkbox" name="insurance_type" value="간병,치매"><span>간병 · 치매</span>
                            </label>
                            <label class="check-item">
                                <input type="checkbox" name="insurance_type" value="저축,종신"><span>저축 · 종신</span>
                            </label>
                            <label class="check-item">
                                <input type="checkbox" name="insurance_type" value="운전자,자동차"><span>운전자 · 자동차</span>
                            </label>
                            <label class="check-item">
                                <input type="checkbox" name="insurance_type" value="기타기타(치아/화재/펫)"><span>기타(치아/화재/펫)</span>
                            </label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="clientMemo">추가로 궁금하시거나 하실 말씀이 있다면?</label>
                        <input type="text" id="clientMemo" class="form-input memo-input" placeholder="예: 기존 보험 분석을 받아보고 싶어요">
                    </div>

                    <button type="submit" class="btn btn-submit">상담 신청 완료하기</button>
                </form>

                <div class="or-text">또는</div>

                <a href="https://open.kakao.com/o/YOUR_LINK" target="_blank" class="btn btn-kakao">
                    카카오톡 실시간 직접 상담
                </a>
            </section>
        </div>
    </div>

    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker
                    .register("./sw.js")
                    .then(() => console.log("Service Worker 등록 완료"))
                    .catch(err => console.error("SW 등록 실패:", err));
            });
        }
    </script>
    
    <!-- 기존 프로젝트 환경용 파이어베이스 라이브러리 목록 -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <!-- 실제 제어 로직이 들어가는 메인 스크립트 -->
    <script src="js/script.js" type="module"></script>
</body>

</html>
