<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비대면 보험 보장 분석 & 상담</title>
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="pamphlet-wrapper">
        
        <div id="step-main" class="page-step active">
            <div class="image-section">
                <img src="images/1436722.png" alt="보험 보장 팜플렛 메인" onclick="goToForm()">
            </div>
            
            <div class="action-bar">
                <button type="button" class="btn btn-next" onclick="goToForm()">
                    📋 비대면 상담 신청하기 (클릭)
                </button>
            </div>
        </div>


        <div id="step-form" class="page-step">
            <div class="back-nav">
                <button type="button" class="btn-back" onclick="goToMain()">⬅️ 팜플렛 다시 보기</button>
            </div>

            <section class="form-section">
                <h2 class="form-title">💬 상담 정보 입력</h2>
                
                <form id="consultForm" onsubmit="handleFormSubmit(event)">
                    <div class="form-group">
                        <label for="clientName">성함</label>
                        <input type="text" id="clientName" class="form-input" placeholder="홍길동" required>
                    </div>
                    <div class="form-group">
                        <label for="clientPhone">연락처</label>
                        <input type="tel" id="clientPhone" class="form-input" placeholder="010-1234-5678" required>
                    </div>
                    <button type="submit" class="btn btn-submit">상담 신청 완료하기</button>
                </form>

                <div class="or-text">또는</div>

                <a href="https://open.kakao.com/o/YOUR_LINK" target="_blank" class="btn btn-kakao">
                    카카오톡 실시간 직접 상담
                </a>
            </section>
        </div>

    </div>

    <script src="js/script.js"></script>
</body>
</html>
