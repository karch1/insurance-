<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비대면 보험 보장 분석 & 상담</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="pamphlet-wrapper">

        <div id="step-main" class="page-step active">
            <div class="image-section" onclick="openModal()">
                <img src="images/4컷2번.png" alt="보험 보장 팜플렛 메인">
            </div>

            <div class="action-bar">
                <button type="button" class="btn btn-next" onclick="goToForm()">
                    📋 비대면 상담 신청하기 (클릭)
                </button>
            </div>
        </div>


        <div id="imageModal" class="modal" onclick="closeModal()">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <img class="modal-content" id="modalImg" src="images/ins(4).png" alt="확대된 팜플렛 이미지">
        </div>


        <div id="step-form" class="page-step">
            <div class="back-nav">
                <button type="button" class="btn-back" onclick="goToMain()"> 팜플렛 다시 보기</button>
            </div>

            <section class="form-section">
                <h2 class="form-title"> 상담 정보 입력</h2>

                <form id="consultForm" onsubmit="handleFormSubmit(event)">
                    <div class="form-group">
                        <label for="clientName">성함</label>
                        <input type="text" id="clientName" class="form-input" placeholder="홍길동" required>
                    </div>

                    <div class="form-group">
                        <label for="clientPhone">연락처</label>
                        <input type="tel" id="clientPhone" class="form-input" placeholder="01012345678" maxlength="13"
                            required>
                        <p class="input-hint">하이픈(-)을 빼고 숫자만 입력해주세요. (자동 입력)</p>
                    </div>

                    <div class="form-group">
                        <label class="group-label"> 어떤 부분이 가장 걱정되시나요? (중복 선택 가능)</label>
                        <div class="checkbox-group">
                            <label class="check-item">
                                <input type="checkbox" name="insurance_type" value="사망"><span>사망</span>
                            </label>
                            <label class="check-item">
                                <input type="checkbox" name="insurance_type" value="암"><span>암</span>
                            </label>
                            <label class="check-item">
                                <input type="checkbox" name="insurance_type" value="뇌,심장"><span>뇌 · 심장</span>
                            </label>
                            <label class="check-item">
                                <input type="checkbox" name="insurance_type" value="간병,치매"><span>간병 · 치매</span>
                            </label>
                            <label class="check-item">
                                <input type="checkbox" name="insurance_type" value="저축,종신"><span>저축 · 종신</span>
                            </label>
                            <label class="check-item">
                                <input type="checkbox" name="insurance_type" value="운전자,자동차"><span>운전자 · 자동차</span>
                            </label>
                            <label class="check-item">
                                <input type="checkbox" name="insurance_type"
                                    value="기타기타(치아/화재/펫)"><span>기타(치아/화재/펫)</span>
                            </label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="clientMemo"> 추가로 궁금하시거나 하실 말씀이 있다면?</label>
                        <input type="text" id="clientMemo" class="form-input memo-input"
                            placeholder="예: 기존 보험 분석을 받아보고 싶어요">
                    </div>

                    <button type="submit" class="btn btn-submit">상담 신청 완료하기</button>
                </form>

                <div class="or-text">또는</div>

                <a href="https://open.kakao.com/o/YOUR_LINK" target="_blank" class="btn btn-kakao">
                    카카오톡 실시간 직접 상담
                </a>
            </section>
        </div>

    </div>

    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker
                    .register("./sw.js")
                    .then(() => console.log("Service Worker 등록 완료"))
                    .catch(err => console.error("SW 등록 실패:", err));
            });
        }
    </script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="js/script.js"></script>
</body>

</html>
